<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">文章 - 小葵的博客</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", "PingFang SC", sans-serif;
            background: #f8fafc; color: #1e293b; line-height: 1.8; padding-top: 45px;
        }
        .top-nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 50;
            background: rgba(255,255,255,0.85); backdrop-filter: blur(12px);
            border-bottom: 1px solid #f1f5f9;
        }
        .top-nav .nav-links {
            max-width: 720px; margin: 0 auto; display: flex; justify-content: center;
            gap: 32px; padding: 12px 24px; font-size: 14px;
        }
        .top-nav .nav-links a { color: #64748b; text-decoration: none; transition: color 0.2s; font-weight: 500; }
        .top-nav .nav-links a:hover { color: #0ea5e9; }
        header {
            background: linear-gradient(135deg, #e0f2fe, #ecfeff, #f0f9ff);
            padding: 48px 24px 40px; text-align: center; position: relative; overflow: hidden;
        }
        header::after {
            content: ''; position: absolute; bottom: -40px; left: 0; width: 100%; height: 80px;
            background: #f8fafc; border-radius: 50% 50% 0 0;
        }
        header h1 { font-size: 32px; font-weight: 800; color: #1e293b; }
        header .sub { color: #64748b; font-size: 15px; margin-top: 6px; }
        .container { max-width: 720px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

        .back-link {
            display: inline-flex; align-items: center; gap: 4px; font-size: 14px;
            color: #64748b; text-decoration: none; margin: 24px 0 16px;
        }
        .back-link:hover { color: #0ea5e9; }

        .post-article {
            background: #fff; border-radius: 16px; padding: 32px;
            border: 1px solid #f1f5f9; margin-bottom: 24px;
        }
        .post-mood { font-size: 36px; margin-bottom: 12px; }
        .post-title { font-size: 26px; font-weight: 800; color: #1e293b; margin-bottom: 12px; line-height: 1.4; }
        .post-meta { font-size: 13px; color: #94a3b8; margin-bottom: 24px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; padding-bottom: 20px; border-bottom: 1px solid #f1f5f9; }
        .post-meta .tag { display: inline-block; background: #e0f2fe; color: #0ea5e9; font-size: 12px; padding: 2px 10px; border-radius: 99px; }

        .post-content { font-size: 15px; color: #334155; line-height: 1.9; }
        .post-content h1,.post-content h2,.post-content h3 { margin: 28px 0 12px; color: #1e293b; font-weight: 700; }
        .post-content h1 { font-size: 22px; } .post-content h2 { font-size: 19px; } .post-content h3 { font-size: 17px; }
        .post-content p { margin-bottom: 16px; }
        .post-content ul,.post-content ol { margin: 12px 0 16px; padding-left: 24px; }
        .post-content li { margin-bottom: 6px; }
        .post-content code { background: #f1f5f9; padding: 2px 8px; border-radius: 6px; font-size: 14px; font-family: "SF Mono","Fira Code","Consolas",monospace; color: #0ea5e9; }
        .post-content pre { background: #1e293b; color: #e2e8f0; padding: 20px 24px; border-radius: 12px; overflow-x: auto; margin: 20px 0; font-size: 14px; }
        .post-content pre code { background: none; padding: 0; color: inherit; }
        .post-content blockquote { border-left: 4px solid #bae6fd; padding: 8px 20px; margin: 16px 0; background: #f8fafc; border-radius: 0 8px 8px 0; color: #64748b; }
        .post-content blockquote p { margin-bottom: 0; }
        .post-content hr { border: none; border-top: 1px solid #e2e8f0; margin: 28px 0; }
        .post-content strong { color: #1e293b; font-weight: 700; }
        .post-content a { color: #0ea5e9; }
        .post-content img { max-width: 100%; border-radius: 10px; margin: 16px 0; }

        .giscus-section { background: #fff; border-radius: 16px; padding: 28px 32px; margin: 24px 0; border: 1px solid #f1f5f9; }
        .giscus-section .section-title { display: flex; align-items: center; gap: 8px; font-size: 18px; font-weight: 700; color: #1e293b; margin-bottom: 20px; }

        .not-found { text-align: center; padding: 80px 24px; color: #94a3b8; }
        .not-found .icon { font-size: 56px; margin-bottom: 16px; }

        footer { text-align: center; padding: 40px 24px 28px; color: #94a3b8; font-size: 13px; }
        footer a { color: #0ea5e9; text-decoration: none; }

        @media (max-width: 600px) {
            header { padding: 40px 16px 32px; }
            header h1 { font-size: 24px; }
            .top-nav .nav-links { gap: 20px; font-size: 13px; }
            .post-article { padding: 20px; }
            .post-title { font-size: 22px; }
            .giscus-section { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="top-nav">
        <div class="nav-links">
            <a href="index.html">🏠 首页</a>
            <a href="posts.html">📝 文章</a>
            <a href="anime.html">🎬 追番</a>
            <a href="about.html">📖 关于</a>
        </div>
    </div>
    <header>
        <h1>📝 文章</h1>
        <p class="sub" id="headerSub">阅读全文 ✨</p>
    </header>

    <div class="container">
        <a href="posts.html" class="back-link">← 返回文章列表</a>
        <div id="postContent"></div>
        <div class="giscus-section">
            <div class="section-title">💬 评论</div>
            <div id="giscus-placeholder">
                <p style="color:#94a3b8;font-size:14px;text-align:center;">评论加载中…</p>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2026 <a href="index.html">小葵的博客</a> · Powered by 🌻</p>
    </footer>

    <script>
        const STORAGE_KEY = 'xiaokui_posts_static';
        const DEFAULT_POSTS = [
            { title: '欢迎来到小葵的博客', content: '这是我的第一篇博客！\n\n以后会在这里分享 **技术笔记**、**追番感想** 和生活日常～\n\n请多指教 ✨', tag: '生活', mood: '😊', date: '2026-05-26' },
            { title: '重温《轻音少女！》剧场版', content: '周末又重温了一遍 **轻音少女 剧场版**，还是那么好看啊！\n\n不得不说京阿尼在细节和情感刻画上真的太强了。从伦敦到日本，每一个场景都充满了温馨和感动。\n\n**最喜欢的片段：**\n\n- 大家在伦敦街头演奏"Angels"的桥段，路人从驻足到加入，那种音乐带来的感染力真的太棒了\n- 梓喵在机场送别时强忍泪水的表情，每次看到都会鼻子一酸\n- 结尾那首"相遇天使"，简直就是给所有热爱K-ON!的人的一封情书\n\n> 青春就是和朋友们一起做喜欢的事，然后笑着说再见。\n\n看完之后又想去练吉他了 🎸\n\n不知道什么时候能再看到她们的新故事呢…', tag: '追番感想', mood: '🥰', date: '2026-05-26' },
            { title: '再听《天使にふれたよ！》—— 重温轻音剧场版', content: '我入宅很晚，也就是去年 8 月才开始接触二次元动画，第一次看轻音应该是 9 月份的事情了。轻音对我的影响很深刻，今天突然想再看一遍剧场版，可能是因为早上又听到了《天使にふれたよ！》了吧。\n\n这次再看剧场版，第一感觉还是那种很熟悉的轻松。没有什么特别激烈的剧情，就是几个人在一起，随便做点什么，好像就已经很好了。\n\n剧情其实大概还记得，是她们毕业前一起去伦敦的那一段。她们毕业前一起去伦敦旅行，梓也跟着一起去了。她们后来还为梓写了一首《天使にふれたよ！》，当作离别前的礼物。\n\n刚到伦敦那一段现在反而记得特别清楚。被出租车送错酒店、在寿司店被误认成乐队、稀里糊涂被推上台——明明都是些很乱的事情，但看着的时候却一直在笑。\n\n夜里酒店安静下来，梓无意间凑到唯桌边，瞥见摊开的歌词草稿上，歪歪扭扭写着一行字：「梓喵 LovE」。她脸颊猛地一热，像被烫到似的缩回手，慌慌张张钻回自己床上，连被子都拉到了鼻尖。\n\n旅行最后一天，她们在伦敦眼下演出完，又匆匆赶着回去。\n\n归途的出租车里，是全片我最爱的一幕。出租车缓缓穿行在伦敦暮色里，梓靠在车窗上沉沉睡去。街灯的暖光一格格掠过她的发梢，车厢里流淌着轻柔的背景音乐，窗外的夜景被揉成模糊的光斑。整个狭小空间，都被包裹在一种安静又柔软的温柔里。那一刻其实什么都没有发生，我却特意把进度条拉回去，又看了一遍。明明刚看过，却还是想再确认一次。\n\n回到学校后，几人听说爵士研要办毕业演唱会，当即一拍即合，打算在教室里办一场属于轻音部的 Live。佐和子想起自己高中时的教室演唱会，决定帮助她们，悄悄帮她们瞒住了教务老师。可纸终究包不住火，熟悉的脚步声还是从走廊那头传了过来。但老师看到她们认真歌唱的模样，也只是无奈又温和地默许了这场小小的狂欢。\n\n教室的演出结束后，四人心里都开始想起来——要为梓写一首只属于她的歌。紬先一步谱好了温柔的旋律，可轮到唯填词时，却总是写了又划、改了又改，总觉得再华丽的词句，也道不尽这两年的心意。\n\n直到某天在天台，风轻轻吹过，唯忽然想起刚入部时，大家演奏的那首《请给我翅膀吧》。她望着楼下的校园，忽然轻声开口：\n\n> "给了我们翅膀的，就是梓喵啊。"\n> "梓喵是让我们变得幸福的、小小的、可爱的天使。"\n\n一瞬间，所有的心意都汇成了歌词。她们赶在毕业之前，终于完成了这份藏满温柔的礼物。\n\n在熟悉的轻音部活动室里，梓被四人请到中间。琴弦轻拨，《天使にふれたよ！》的旋律缓缓响起，把那些一直没说出口的话，都唱给了她。\n\n画面一转，少女们在桥上奔跑。「おしまい」的字样出现，电影就此结束。但我总觉得，她们的故事还在继续。她们会升入大学，会拥有更远的未来，只是我们，好像已经没有办法再看到后面的部分了。', tag: '追番感想', mood: '😊', date: '2026-05-26' }
        ];

        function getPosts() {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (raw) {
                const list = JSON.parse(raw);
                const existingTitles = new Set(list.map(p => p.title));
                const missing = DEFAULT_POSTS.filter(p => !existingTitles.has(p.title));
                if (missing.length) {
                    list.unshift(...missing);
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
                }
                return list;
            }
            localStorage.setItem(STORAGE_KEY, JSON.stringify(DEFAULT_POSTS));
            return [...DEFAULT_POSTS];
        }

        function escHtml(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
        function formatDate(d) { if (!d) return ''; const p=d.split('-'); return p[0]+'.'+p[1]+'.'+p[2]; }
        function renderMarkdown(t) { return typeof marked!=='undefined'&&marked.parse ? marked.parse(t,{breaks:true}) : t.replace(/\n/g,'<br>'); }

        function loadPost() {
            const params = new URLSearchParams(window.location.search);
            const id = parseInt(params.get('id'));
            const posts = getPosts();
            const container = document.getElementById('postContent');

            if (isNaN(id) || id < 0 || id >= posts.length) {
                container.innerHTML = '<div class="not-found"><div class="icon">🔍</div><p>文章不存在</p></div>';
                document.querySelector('.giscus-section').style.display = 'none';
                return;
            }

            const p = posts[id];
            document.title = escHtml(p.title) + ' - 小葵的博客';
            document.getElementById('headerSub').textContent = '『' + escHtml(p.title) + '』';

            container.innerHTML = `
                <div class="post-article">
                    <div class="post-mood">${p.mood||'📝'}</div>
                    <h1 class="post-title">${escHtml(p.title)}</h1>
                    <div class="post-meta">
                        ${formatDate(p.date)}${p.tag ? '<span class="tag">'+escHtml(p.tag)+'</span>' : ''}
                    </div>
                    <div class="post-content">${renderMarkdown(p.content||'')}</div>
                </div>
            `;
        }

        // ===== Giscus =====
        (function initGiscus() {
            const params = new URLSearchParams(window.location.search);
            const id = parseInt(params.get('id'));
            const posts = getPosts();
            if (isNaN(id) || id < 0 || id >= posts.length) {
                document.getElementById('giscus-placeholder').innerHTML = '';
                return;
            }
            const script = document.createElement('script');
            script.src = 'https://giscus.app/client.js';
            script.setAttribute('data-repo', 'xiaokuiizumi/xiaokui-blog');
            script.setAttribute('data-repo-id', 'R_kgDOSoW0Fg');
            script.setAttribute('data-category', 'Announcements');
            script.setAttribute('data-category-id', 'DIC_kwDOSoW0Fs4C94T_');
            script.setAttribute('data-mapping', 'url');
            script.setAttribute('data-strict', '0');
            script.setAttribute('data-reactions-enabled', '1');
            script.setAttribute('data-emit-metadata', '0');
            script.setAttribute('data-input-position', 'bottom');
            script.setAttribute('data-theme', 'preferred_color_scheme');
            script.setAttribute('data-lang', 'zh-CN');
            script.setAttribute('crossorigin', 'anonymous');
            script.async = true;
            document.getElementById('giscus-placeholder').appendChild(script);
        })();

        loadPost();
    </script>
</body>
</html>
