<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小葵的文章</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", "PingFang SC", sans-serif;
            background: #f8fafc; color: #1e293b; line-height: 1.8; padding-top: 45px;
        }
        .top-nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 50;
            background: rgba(255,255,255,0.85); backdrop-filter: blur(12px);
            border-bottom: 1px solid #f1f5f9;
        }
        .top-nav .nav-links {
            max-width: 720px; margin: 0 auto; display: flex; justify-content: center;
            gap: 32px; padding: 12px 24px; font-size: 14px;
        }
        .top-nav .nav-links a { color: #64748b; text-decoration: none; transition: color 0.2s; font-weight: 500; }
        .top-nav .nav-links a:hover { color: #0ea5e9; }
        header {
            background: linear-gradient(135deg, #e0f2fe, #ecfeff, #f0f9ff);
            padding: 48px 24px 40px; text-align: center; position: relative; overflow: hidden;
        }
        header::after {
            content: ''; position: absolute; bottom: -40px; left: 0; width: 100%; height: 80px;
            background: #f8fafc; border-radius: 50% 50% 0 0;
        }
        header h1 { font-size: 32px; font-weight: 800; color: #1e293b; }
        header .sub { color: #64748b; font-size: 15px; margin-top: 6px; }
        .container { max-width: 720px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

        .toolbar { margin: 24px 0 20px; }
        .toolbar .count { font-size: 14px; color: #64748b; }
        .toolbar .count strong { color: #0ea5e9; }

        .post-card {
            background: #fff; border-radius: 14px; padding: 24px 28px; margin-bottom: 16px;
            border: 1px solid #f1f5f9;
        }
        .post-card:hover { border-color: #bae6fd; box-shadow: 0 4px 20px rgba(14,165,233,0.08); }
        .post-mood { font-size: 28px; margin-bottom: 8px; }
        .post-meta { font-size: 13px; color: #94a3b8; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .post-meta .tag {
            display: inline-block; background: #e0f2fe; color: #0ea5e9;
            font-size: 12px; padding: 2px 10px; border-radius: 99px;
        }
        .post-card h3 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
        .post-card h3 a { color: #1e293b; text-decoration: none; }
        .post-card h3 a:hover { color: #0ea5e9; }
        .post-summary { font-size: 14px; color: #64748b; line-height: 1.7; }
        .post-summary .read-more { color: #0ea5e9; font-weight: 600; text-decoration: none; white-space: nowrap; }
        .post-summary .read-more:hover { text-decoration: underline; }

        .empty-state { text-align: center; padding: 64px 24px; color: #94a3b8; }
        .empty-state .icon { font-size: 56px; margin-bottom: 16px; }

        footer { text-align: center; padding: 40px 24px 28px; color: #94a3b8; font-size: 13px; }
        footer a { color: #0ea5e9; text-decoration: none; }

        @media (max-width: 600px) {
            header { padding: 40px 16px 32px; }
            header h1 { font-size: 24px; }
            .top-nav .nav-links { gap: 20px; font-size: 13px; }
            .post-card { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="top-nav">
        <div class="nav-links">
            <a href="index.html">🏠 首页</a>
            <a href="posts.html">📝 文章</a>
            <a href="anime.html">🎬 追番</a>
            <a href="about.html">📖 关于</a>
        </div>
    </div>
    <header>
        <h1>📝 小葵的文章</h1>
        <p class="sub">记录技术、生活和思考 ✨</p>
    </header>

    <div class="container">
        <div class="toolbar">
            <span class="count">共 <strong id="totalCount">0</strong> 篇</span>
        </div>
        <div id="postList"><div class="empty-state"><div class="icon">📝</div><p>加载中…</p></div></div>
    </div>

    <footer>
        <p>© 2026 <a href="index.html">小葵的博客</a> · 共 <strong id="footerCount">0</strong> 篇</p>
    </footer>

    <script>
        const STORAGE_KEY = 'xiaokui_posts_static';
        const DEFAULT_POSTS = [
            { title: '欢迎来到小葵的博客', content: '这是我的第一篇博客！\n\n以后会在这里分享 **技术笔记**、**追番感想** 和生活日常～\n\n请多指教 ✨', tag: '生活', mood: '😊', date: '2026-05-26' }
        ];

        function getPosts() {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (raw) return JSON.parse(raw);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(DEFAULT_POSTS));
            return [...DEFAULT_POSTS];
        }

        function stripMarkdown(t) { return t.replace(/[#*_`~\[\]]/g,'').replace(/>\s/g,'').replace(/- /g,'').trim(); }

        function render() {
            const list = getPosts();
            const el = document.getElementById('postList');
            document.getElementById('totalCount').textContent = list.length;
            document.getElementById('footerCount').textContent = list.length;

            if (list.length === 0) {
                el.innerHTML = '<div class="empty-state"><div class="icon">📝</div><p>还没有文章～</p></div>';
                return;
            }
            el.innerHTML = list.map((p, i) => {
                const plain = stripMarkdown(p.content||'');
                const summary = plain.length > 150 ? plain.slice(0, 150) + '…' : plain;
                return `<div class="post-card">
                    <div class="post-mood">${p.mood||'📝'}</div>
                    <div class="post-meta">${formatDate(p.date)}${p.tag ? '<span class="tag">'+escHtml(p.tag)+'</span>' : ''}</div>
                    <h3><a href="post.html?id=${i}">${escHtml(p.title)}</a></h3>
                    <div class="post-summary">${escHtml(summary)} <a href="post.html?id=${i}" class="read-more">阅读全文 →</a></div>
                </div>`;
            }).join('');
        }

        function formatDate(d) { if (!d) return ''; const p=d.split('-'); return p[0]+'.'+p[1]+'.'+p[2]; }
        function escHtml(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

        render();
    </script>
</body>
</html>
