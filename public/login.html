<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 小葵的博客</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", "PingFang SC", sans-serif;
            background: linear-gradient(135deg, #e0f2fe, #f0f9ff);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            background: #fff;
            border-radius: 20px;
            padding: 40px 36px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 8px 40px rgba(14,165,233,0.12);
            text-align: center;
        }
        .avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0ea5e9, #3b82f6);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 28px;
            color: #fff;
        }
        h1 { font-size: 22px; font-weight: 700; color: #1e293b; }
        .sub { color: #64748b; font-size: 14px; margin: 4px 0 28px; }
        .form-group { margin-bottom: 16px; text-align: left; }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #475569;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #0ea5e9;
            box-shadow: 0 0 0 3px rgba(14,165,233,0.1);
        }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            background: linear-gradient(135deg, #0ea5e9, #3b82f6);
            color: #fff;
            transition: all 0.2s;
        }
        .btn:hover { box-shadow: 0 4px 16px rgba(14,165,233,0.35); }
        .error {
            font-size: 13px;
            color: #ef4444;
            margin-top: 12px;
            display: none;
        }
        .back { margin-top: 20px; font-size: 13px; }
        .back a { color: #0ea5e9; text-decoration: none; }
        .status { font-size: 13px; color: #64748b; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <div class="avatar">🌻</div>
        <h1>管理员登录</h1>
        <p class="sub">登录后可以管理文章和追番</p>
        <div class="form-group">
            <label>用户名</label>
            <input type="text" id="username" placeholder="admin" autocomplete="username">
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" id="password" placeholder="••••••" autocomplete="current-password">
        </div>
        <button class="btn" onclick="login()">登 录</button>
        <div class="error" id="errorMsg"></div>
        <div class="status" id="statusMsg">✅ 已登录</div>
        <div class="back"><a href="blog.html">← 返回博客</a></div>
    </div>
    <script>
        async function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorEl = document.getElementById('errorMsg');

            if (!username || !password) {
                errorEl.textContent = '请输入用户名和密码';
                errorEl.style.display = 'block';
                return;
            }

            errorEl.style.display = 'none';

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (!res.ok) {
                    errorEl.textContent = data.error || '登录失败';
                    errorEl.style.display = 'block';
                    return;
                }

                localStorage.setItem('token', data.token);
                document.getElementById('statusMsg').style.display = 'block';
                setTimeout(() => { window.location.href = 'blog.html'; }, 800);
            } catch {
                errorEl.textContent = '网络错误，请重试';
                errorEl.style.display = 'block';
            }
        }

        document.getElementById('password').addEventListener('keydown', e => {
            if (e.key === 'Enter') login();
        });

        // 如果已登录，自动跳转
        if (localStorage.getItem('token')) {
            window.location.href = 'blog.html';
        }
    </script>
</body>
</html>
