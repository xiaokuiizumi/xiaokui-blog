<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小葵的追番列表</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", "PingFang SC", sans-serif;
            background: #f8fafc; color: #1e293b; line-height: 1.8; padding-top: 45px;
        }
        .top-nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 50;
            background: rgba(255,255,255,0.85); backdrop-filter: blur(12px);
            border-bottom: 1px solid #f1f5f9;
        }
        .top-nav .nav-links {
            max-width: 880px; margin: 0 auto; display: flex; justify-content: center;
            gap: 32px; padding: 12px 24px; font-size: 14px;
        }
        .top-nav .nav-links a { color: #64748b; text-decoration: none; transition: color 0.2s; font-weight: 500; }
        .top-nav .nav-links a:hover { color: #0ea5e9; }
        header {
            background: linear-gradient(135deg, #e0f2fe, #ecfeff, #f0f9ff);
            padding: 48px 24px 40px; text-align: center; position: relative; overflow: hidden;
        }
        header::after {
            content: ''; position: absolute; bottom: -40px; left: 0; width: 100%; height: 80px;
            background: #f8fafc; border-radius: 50% 50% 0 0;
        }
        header h1 { font-size: 32px; font-weight: 800; color: #1e293b; }
        header .sub { color: #64748b; font-size: 15px; margin-top: 6px; }
        .container { max-width: 880px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

        .toolbar { margin: 24px 0 20px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .toolbar .count { font-size: 14px; color: #64748b; }
        .toolbar .count strong { color: #0ea5e9; }

        .filter-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .filter-btn { padding: 6px 16px; border-radius: 99px; font-size: 13px; border: 1px solid #e2e8f0; background: #fff; color: #64748b; cursor: pointer; }
        .filter-btn:hover { border-color: #bae6fd; color: #0ea5e9; }
        .filter-btn.active { background: #e0f2fe; border-color: #0ea5e9; color: #0ea5e9; font-weight: 600; }

        .anime-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px; }
        .anime-card { background: #fff; border-radius: 12px; overflow: hidden; border: 1px solid #f1f5f9; }
        .anime-card:hover { border-color: #bae6fd; box-shadow: 0 8px 24px rgba(14,165,233,0.12); }

        .anime-cover { width: 100%; height: 140px; display: flex; align-items: center; justify-content: center; font-size: 40px; position: relative; }
        .anime-cover .status-badge { position: absolute; top: 10px; right: 10px; font-size: 11px; padding: 3px 10px; border-radius: 99px; font-weight: 600; background: rgba(255,255,255,0.85); backdrop-filter: blur(4px); }
        .status-badge.done { color: #059669; }
        .status-badge.watching { color: #0ea5e9; }
        .status-badge.paused { color: #f59e0b; }
        .anime-body { padding: 14px 16px 16px; }
        .anime-body h4 { font-size: 15px; font-weight: 600; color: #1e293b; margin-bottom: 2px; }
        .anime-body .anime-origin { font-size: 12px; color: #94a3b8; margin-bottom: 8px; }
        .anime-body .anime-comment { font-size: 13px; color: #64748b; line-height: 1.6; }
        .anime-body .anime-rating { margin-top: 8px; font-size: 14px; letter-spacing: 2px; }
        .anime-cover .cover-img { width: 100%; height: 100%; object-fit: cover; }

        .empty-state { text-align: center; padding: 64px; color: #94a3b8; }

        footer { text-align: center; padding: 40px 24px 28px; color: #94a3b8; font-size: 13px; }
        footer a { color: #0ea5e9; text-decoration: none; }

        @media (max-width: 600px) {
            header { padding: 40px 16px 32px; }
            header h1 { font-size: 24px; }
            .top-nav .nav-links { gap: 20px; font-size: 13px; }
            .anime-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
            .toolbar { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
    <div class="top-nav">
        <div class="nav-links">
            <a href="index.html">🏠 首页</a>
            <a href="posts.html">📝 文章</a>
            <a href="anime.html">🎬 追番</a>
            <a href="about.html">📖 关于</a>
        </div>
    </div>
    <header>
        <h1>🎬 小葵的追番列表</h1>
        <p class="sub">记录每一部看过的动画 ✨</p>
    </header>

    <div class="container">
        <div class="toolbar">
            <span class="count">共 <strong id="totalCount">0</strong> 部</span>
            <div class="filter-group">
                <button class="filter-btn active" data-filter="all">全部</button>
                <button class="filter-btn" data-filter="done">已追完</button>
                <button class="filter-btn" data-filter="watching">追剧中</button>
                <button class="filter-btn" data-filter="paused">搁置中</button>
            </div>
        </div>
        <div class="anime-grid" id="animeGrid"><div class="empty-state" style="grid-column:1/-1"><p>加载中…</p></div></div>
    </div>

    <footer>
        <p>© 2026 <a href="index.html">小葵的博客</a> · 共 <strong id="footerCount">0</strong> 部番剧</p>
    </footer>

    <script>
        const STORAGE_KEY = 'xiaokui_anime_static';
        const DEFAULT_ANIME = [
            { name:'幸运星', origin:'2007 · 京都动画', comment:'最喜欢的日常番！此方就是我的灵魂导师～', status:'done', rating:5, color:'fce4ec,f8bbd0', icon:'⭐', cover:null },
            { name:'轻音少女', origin:'2009 · 京都动画', comment:'看完想学吉他了！唯酱太可爱了呜呜', status:'done', rating:5, color:'e0f2fe,bae6fd', icon:'🎸', cover:null },
            { name:'琉璃龙龙', origin:'2025 · 动画工房', comment:'龙娘日常太治愈了，每周的精神食粮！', status:'watching', rating:5, color:'f0fdf4,bbf7d0', icon:'🐉', cover:null },
            { name:'摇曳露营△', origin:'2018 · C-Station', comment:'看了之后开始迷上露营了，抚子太治愈了', status:'done', rating:5, color:'fef3c7,fde68a', icon:'🌻', cover:null },
            { name:'孤独摇滚！', origin:'2022 · CloverWorks', comment:'波奇酱太真实了，社恐也能闪闪发光！', status:'watching', rating:5, color:'fce7f3,fbcfe8', icon:'☕', cover:null },
            { name:'白箱', origin:'2014 · P.A.Works', comment:'做动画的动画，看了更想做创作相关的工作了', status:'done', rating:5, color:'dbeafe,bfdbfe', icon:'🎨', cover:null },
        ];
        const STATUS_MAP = { done:'已追完', watching:'追剧中', paused:'搁置中' };
        const RATING_MAP = { 5:'⭐⭐⭐⭐⭐', 4:'⭐⭐⭐⭐', 3:'⭐⭐⭐', 2:'⭐⭐', 1:'⭐' };

        let currentFilter = 'all';

        function getAnime() {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (raw) return JSON.parse(raw);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(DEFAULT_ANIME));
            return [...DEFAULT_ANIME];
        }

        function escHtml(s) { if(!s)return ''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

        function render() {
            const list = getAnime();
            const filtered = currentFilter === 'all' ? list : list.filter(a => a.status === currentFilter);
            const grid = document.getElementById('animeGrid');
            document.getElementById('totalCount').textContent = list.length;
            document.getElementById('footerCount').textContent = list.length;

            if (filtered.length === 0) {
                grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><p>还没有番剧哦～</p></div>';
                return;
            }
            grid.innerHTML = filtered.map(a => {
                const cols = a.color.split(',');
                const stars = RATING_MAP[a.rating]||'⭐⭐⭐⭐⭐';
                const cover = a.cover ? '<img class="cover-img" src="'+a.cover+'" alt="'+escHtml(a.name)+'">' : (a.icon||'📺');
                const cClass = a.cover ? 'anime-cover has-image' : 'anime-cover';
                return '<div class="anime-card">' +
                    '<div class="'+cClass+'" style="background:linear-gradient(135deg,#'+cols[0]+',#'+cols[1]+')">' +
                        cover +
                        '<span class="status-badge '+a.status+'">'+STATUS_MAP[a.status]+'</span>' +
                    '</div>' +
                    '<div class="anime-body">' +
                        '<h4>'+escHtml(a.name)+'</h4>' +
                        '<div class="anime-origin">'+escHtml(a.origin||'—')+'</div>' +
                        '<div class="anime-comment">'+escHtml(a.comment||'—')+'</div>' +
                        '<div class="anime-rating">'+stars+'</div>' +
                    '</div></div>';
            }).join('');
        }

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
                this.classList.add('active'); currentFilter=this.dataset.filter; render();
            });
        });

        render();
    </script>
</body>
</html>
